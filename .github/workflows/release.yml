name: Release

# Publishes tagged releases to PyPI using Trusted Publishing (OIDC).
# No API token is stored — PyPI verifies the workflow's identity via OIDC.
#
# Setup (one-time, on pypi.org):
#   Project → Manage → Publishing → Add a publisher
#     Owner:          mtsanaissi
#     Repository:     opencode-perf-stats
#     Workflow name:  release.yml
#     Environment:    pypi
#
# To cut a release:
#   1. Bump version in pyproject.toml and src/opencode_perf_stats/__init__.py
#   2. git tag -a v0.1.0 -m "Release v0.1.0"
#   3. git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

# Required for OIDC token exchange with PyPI.
permissions:
  id-token: write

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify build metadata
        run: |
          python -m twine check dist/*
          echo "--- wheel contents (web assets) ---"
          python - <<'PY'
          import zipfile, glob, sys
          wheels = glob.glob("dist/*.whl")
          if not wheels:
              print("No wheel found", file=sys.stderr); sys.exit(1)
          with zipfile.ZipFile(wheels[0]) as z:
              web = [n for n in z.namelist() if "/web/" in n]
          for n in sorted(web):
              print(n)
          expected = {
              "templates/aggregate.html", "templates/base.html",
              "templates/compare.html", "templates/discovery.html",
              "templates/error.html", "templates/single.html",
              "templates/trends.html",
              "static/app.js", "static/styles.css",
          }
          found = {n.split("/web/", 1)[1] for n in web}
          missing = expected - found
          if missing:
              print(f"Missing web assets: {missing}", file=sys.stderr); sys.exit(1)
          print(f"All {len(expected)} expected web assets present.")
          PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
