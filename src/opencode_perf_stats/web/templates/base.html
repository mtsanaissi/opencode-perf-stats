<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}opencode-perf-stats{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="nav">
        <span class="nav-brand">opencode-perf-stats</span>
        <a href="{{ url_for('discovery') }}" class="{{ 'active' if nav == 'discover' else '' }}">Discover</a>
        <a href="{{ url_for('aggregate') }}" class="{{ 'active' if nav == 'aggregate' else '' }}">Aggregate</a>
        <a href="{{ url_for('trends') }}" class="{{ 'active' if nav == 'trends' else '' }}">Trends</a>
        <a href="{{ url_for('compare_landing') }}" class="{{ 'active' if nav == 'compare' else '' }}">Compare</a>
        <span class="nav-spacer"></span>
        <span class="nav-meta">v{{ version }}</span>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        Generated by <strong>opencode-perf-stats</strong> &mdash; db: <span class="mono">{{ db_path }}</span>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
